events {
    worker_connections 1024;
}

http {
    server {
        listen 80;
        server_name nexasphere.clean; # Replace with actual domain

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name nexasphere.clean;

        ssl_certificate /etc/letsencrypt/live/nexasphere.clean/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/nexasphere.clean/privkey.pem;

        location / {
            proxy_pass http://nexasphere-web:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
