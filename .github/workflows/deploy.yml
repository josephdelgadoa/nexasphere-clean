name: Deploy to VPS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Copy files to VPS
        uses: appleboy/scp-action@master
        with:
          host: 72.62.162.228
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "."
          target: "~/nexasphere-clean"

      - name: Deploy via Docker Compose
        uses: appleboy/ssh-action@master
        with:
          host: 72.62.162.228
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/nexasphere-clean
            docker-compose down
            docker-compose up -d --build
