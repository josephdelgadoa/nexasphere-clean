name: Deploy to VPS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Copy files to VPS
        uses: appleboy/scp-action@master
        with:
          host: 72.62.162.228
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "."
          target: "~/nexasphere-clean"

      - name: Deploy via Docker Compose
        uses: appleboy/ssh-action@master
        with:
          host: 72.62.162.228
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/nexasphere-clean
            # Create .env.production on the fly from GitHub Secrets
            echo "NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" > .env.production
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" >> .env.production
            echo "SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" >> .env.production
            echo "OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}" >> .env.production
            echo "STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}" >> .env.production
            echo "NEXT_PUBLIC_BASE_URL=${{ secrets.NEXT_PUBLIC_BASE_URL || 'http://localhost:8008' }}" >> .env.production
            
            docker-compose down
            docker-compose up -d --build
